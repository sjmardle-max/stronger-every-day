/* ---------------- Calendar helpers ---------------- */

const WEEKDAY_LETTERS = ["S", "M", "T", "W", "T", "F", "S"];
const MONTH_NAMES = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const WEEKDAY_NAMES = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function dateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getDayTheme(date) {
  const dow = date.getDay();
  if (dow >= 1 && dow <= 5) {
    const d = days[dow - 1];
    return { type: "weekday", color: d.color, accent: d.accent, light: d.light, data: d };
  }
  if (dow === 6) return { type: "saturday", color: saturday.color, accent: saturday.accent, light: saturday.light, data: saturday };
  return { type: "sunday", color: "#555", accent: "#999", light: "#EFEFEF", data: null };
}

const CalendarDay = ({ date, isCurrentMonth, isToday, isSelected, isCompleted, onClick }) => {
  const theme = getDayTheme(date);
  return (
    <div onClick={onClick} style={{
      position: "relative", aspectRatio: "1", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      gap: 3, borderRadius: 10, cursor: "pointer", opacity: isCurrentMonth ? 1 : 0.3,
      background: isSelected ? theme.color : "transparent",
      border: isToday && !isSelected ? `2px solid ${theme.accent}` : "2px solid transparent",
    }}>
      {isCompleted && (
        <div style={{
          position: "absolute", top: -3, right: -3, width: 15, height: 15, borderRadius: "50%",
          background: "#4A8C60", color: "#fff", fontSize: 9, fontWeight: 900,
          display: "flex", alignItems: "center", justifyContent: "center", border: "1.5px solid #fff",
        }}>✓</div>
      )}
      <div style={{ fontSize: 13, fontWeight: 700, color: isSelected ? "#fff" : "#1a1a1a" }}>{date.getDate()}</div>
      <div style={{ width: 5, height: 5, borderRadius: "50%", background: isSelected ? "rgba(255,255,255,0.85)" : theme.accent }} />
    </div>
  );
};

const Calendar = ({ viewMonth, setViewMonth, selectedDate, onSelect, completed }) => {
  const year = viewMonth.getFullYear();
  const month = viewMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(new Date(year, month, i - startOffset + 1));
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));
  while (cells.length % 7 !== 0) cells.push(new Date(year, month, daysInMonth + (cells.length - startOffset - daysInMonth) + 1));

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: "16px 16px 12px", boxShadow: "0 4px 24px rgba(0,0,0,0.08)", marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <div onClick={() => setViewMonth(new Date(year, month - 1, 1))} style={{ cursor: "pointer", padding: "4px 10px", fontSize: 16, color: "#999" }}>‹</div>
        <div style={{ fontSize: 14, fontWeight: 800, color: "#1a1a1a" }}>{MONTH_NAMES[month]} {year}</div>
        <div onClick={() => setViewMonth(new Date(year, month + 1, 1))} style={{ cursor: "pointer", padding: "4px 10px", fontSize: 16, color: "#999" }}>›</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
        {WEEKDAY_LETTERS.map((l, i) => (
          <div key={i} style={{ textAlign: "center", fontSize: 10, fontWeight: 700, color: "#bbb" }}>{l}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {cells.map((date, i) => (
          <CalendarDay key={i} date={date} isCurrentMonth={date.getMonth() === month}
            isToday={sameDay(date, today)} isSelected={sameDay(date, selectedDate)}
            isCompleted={!!completed[dateKey(date)]}
            onClick={() => onSelect(date)} />
        ))}
      </div>
      {!sameDay(selectedDate, today) && (
        <div onClick={() => { onSelect(today); setViewMonth(new Date(today.getFullYear(), today.getMonth(), 1)); }}
          style={{ textAlign: "center", marginTop: 10, fontSize: 11, fontWeight: 700, color: "#4A8C60", cursor: "pointer" }}>
          Jump to Today
        </div>
      )}
    </div>
  );
};

          <div key={i} style={{ background: "#F5F5F0", borderRadius: 8, padding: "10px 12px", borderLeft: `3px solid ${saturday.accent}` }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#1a1a1a" }}>{b.name}</div>
            <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>{b.detail}</div>
          </div>
        ))}
      </div>
      <div style={{ background: "#E8F5F8", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${saturday.accent}` }}>
        <div style={{ fontSize: 10, fontWeight: 800, color: saturday.accent, letterSpacing: "0.1em", marginBottom: 3 }}>COACH TIP</div>
        <div style={{ fontSize: 12, color: "#444", lineHeight: 1.6 }}>{saturday.tip}</div>
      </div>
    </div>
  </div>
);

const SundayCard = ({ dateLabel, isCompleted, onToggleComplete }) => (
  <div style={{ background: "#fff", borderRadius: 16, overflow: "hidden", boxShadow: "0 4px 24px rgba(0,0,0,0.08)", marginBottom: 20 }}>
    <div style={{ background: "#555", padding: "18px 20px 14px" }}>
      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 4 }}>{dateLabel} — REST</div>
      <h2 style={{ color: "#fff", margin: 0, fontSize: 20, fontWeight: 900 }}>Rest Day</h2>
      <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, marginTop: 3 }}>Recover and Recharge</div>
      <div style={{ marginTop: 12 }}>
        <CompleteToggle isCompleted={isCompleted} onToggle={onToggleComplete} />
      </div>
    </div>
    <div style={{ padding: "14px 20px" }}>
      {[
        { icon: "🌙", title: "Sleep", detail: "Aim for 7–9 hours" },
        { icon: "🚶", title: "Move Gently", detail: "Walk, stretch, or do something you enjoy" },
        { icon: "🧘", title: "Focus on You", detail: "Hydrate, eat well, relax and reflect" },
      ].map((r, i) => (
        <div key={i} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 0", borderBottom: i < 2 ? "1px solid #f0f0f0" : "none" }}>
          <div style={{ fontSize: 20 }}>{r.icon}</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#1a1a1a" }}>{r.title}</div>
            <div style={{ fontSize: 12, color: "#888" }}>{r.detail}</div>
          </div>
        </div>
      ))}
      <div style={{ marginTop: 12, background: "#F5F5F0", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#555", fontStyle: "italic", lineHeight: 1.6, textAlign: "center" }}>
        Rest is when your muscles grow. Give your body time to rebuild and come back stronger.
      </div>
    </div>
  </div>
);

function App() {
  const today = new Date();
  const [viewMonth, setViewMonth] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDate, setSelectedDate] = useState(today);
  const [openEx, setOpenEx] = useState(null);
  const [completed, setCompleted] = useState(() => {
    try { return JSON.parse(localStorage.getItem("workoutCompleted")) || {}; }
    catch (e) { return {}; }
  });

  useEffect(() => {
    localStorage.setItem("workoutCompleted", JSON.stringify(completed));
  }, [completed]);

  const handleSelect = (date) => { setSelectedDate(date); setOpenEx(null); };
  const toggleEx = (i) => setOpenEx(openEx === i ? null : i);
  const toggleComplete = (date) => {
    const key = dateKey(date);
    setCompleted((prev) => {
      const next = { ...prev };
      if (next[key]) delete next[key];
      else next[key] = true;
      return next;
    });
  };
  const theme = getDayTheme(selectedDate);
  const dateLabel = `${WEEKDAY_NAMES[selectedDate.getDay()].toUpperCase()}, ${MONTH_NAMES[selectedDate.getMonth()].slice(0, 3).toUpperCase()} ${selectedDate.getDate()}`;
  const isSelectedCompleted = !!completed[dateKey(selectedDate)];

  return (
    <div style={{ fontFamily: "Inter, Helvetica Neue, Arial, sans-serif", background: "#F5F5F0", minHeight: "100vh", paddingBottom: 40 }}>
      <div style={{ background: "#111", padding: "28px 24px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 10, letterSpacing: "0.25em", color: "#888", marginBottom: 6, fontWeight: 700 }}>WORKOUT CALENDAR</div>
        <h1 style={{ color: "#fff", fontSize: 26, fontWeight: 900, margin: 0, letterSpacing: "-0.02em" }}>STRONGER EVERY DAY</h1>
        <div style={{ color: "#666", fontSize: 12, marginTop: 6, letterSpacing: "0.05em" }}>Tap any date to see that day's workout.</div>
      </div>

      <div style={{ background: "#1a1a1a", padding: "10px 20px", display: "flex", gap: 20, overflowX: "auto", borderBottom: "1px solid #333" }}>
        {["2 sets per exercise", "8–12 reps per set", "Rest 45–60 sec between sets", "Quality over quantity"].map((g, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <div style={{ width: 5, height: 5, borderRadius: "50%", background: "#4A8C60" }} />
            <span style={{ fontSize: 11, color: "#aaa", whiteSpace: "nowrap", fontWeight: 500 }}>{g}</span>
          </div>
        ))}
      </div>

      <div style={{ maxWidth: 520, margin: "0 auto", padding: "0 16px" }}>
        <div style={{ marginTop: 24 }}>
          <Calendar viewMonth={viewMonth} setViewMonth={setViewMonth} selectedDate={selectedDate} onSelect={handleSelect} completed={completed} />
        </div>

        {theme.type === "weekday" && <WeekdayCard d={theme.data} dateLabel={dateLabel} openEx={openEx} toggleEx={toggleEx} isCompleted={isSelectedCompleted} onToggleComplete={() => toggleComplete(selectedDate)} />}
        {theme.type === "saturday" && <SaturdayCard dateLabel={dateLabel} isCompleted={isSelectedCompleted} onToggleComplete={() => toggleComplete(selectedDate)} />}
        {theme.type === "sunday" && <SundayCard dateLabel={dateLabel} isCompleted={isSelectedCompleted} onToggleComplete={() => toggleComplete(selectedDate)} />}

        <div style={{ background: "#111", borderRadius: 16, padding: "20px", marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#fff", letterSpacing: "0.12em", marginBottom: 14 }}>PROGRESSION — EACH WEEK, IMPROVE ONE:</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {[{ icon: "➕", label: "Add 1 rep" }, { icon: "🎯", label: "Improve your form" }, { icon: "⬆️", label: "Increase the weight" }, { icon: "🐢", label: "Slow down the movement" }].map((p, i) => (
              <div key={i} style={{ background: "#1e1e1e", borderRadius: 8, padding: "10px 12px", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 16 }}>{p.icon}</span>
                <span style={{ fontSize: 12, color: "#ccc", fontWeight: 500 }}>{p.label}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{ textAlign: "center", padding: "8px 0" }}>
          <div style={{ fontSize: 11, color: "#bbb", letterSpacing: "0.1em", fontWeight: 600 }}>★ CONSISTENCY IS KEY. SHOW UP. DO THE WORK. BE PROUD.</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
